name: aws-well-architected-review
version: 1.0.0
description: Cloud Engineer/Solutions Architect review of an AWS solution architecture against the Well-Architected Framework — reliability/availability/fault tolerance and security first, with a versioned risk-classified report
category: infra
trigger: /aws-well-architected-review
author: diovanibmotta
license: MIT

install:
  source: aws-well-architected-review.md
  destinations:
    global:
      windows: "%USERPROFILE%\.claude\commands\aws-well-architected-review.md"
      unix: "~/.claude/commands/aws-well-architected-review.md"
    local: ".claude/commands/aws-well-architected-review.md"

requirements:
  - name: aws-cli
    description: Optional — useful when the review needs to inspect live AWS resource configuration, not just IaC/diagrams
